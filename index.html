<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#7a1f3d">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Vino">
<title>Vino – Wein lernen</title>
<style>
:root{
  --bg:#faf7f2; --card:#ffffff; --ink:#2a2024; --muted:#8a7d82;
  --line:#ece4dc; --shadow:0 6px 20px rgba(60,30,40,.08);
  --grund:#c79a2b; --grund-d:#9c7716;
  --tief:#7a1f3d; --tief-d:#5c1430;
  --good:#3a8a55; --bad:#c0453b;
  --accent:var(--grund); --accent-d:var(--grund-d);
}
[data-theme="dark"]{
  --bg:#17131a; --card:#221b27; --ink:#f3ebef; --muted:#a899a3;
  --line:#332a39; --shadow:0 6px 20px rgba(0,0,0,.4);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg); color:var(--ink); line-height:1.5;
  max-width:560px; margin:0 auto; padding:0 14px 90px;
  -webkit-font-smoothing:antialiased;
}
header{
  position:sticky; top:0; z-index:20; background:var(--bg);
  padding:14px 2px 8px; display:flex; align-items:center; gap:10px;
}
.brand{font-weight:800; font-size:20px; letter-spacing:-.3px; flex:1}
.brand span{color:var(--accent)}
.stat{font-size:13px; font-weight:700; background:var(--card); border:1px solid var(--line);
  padding:5px 9px; border-radius:999px; box-shadow:var(--shadow)}
.iconbtn{border:1px solid var(--line); background:var(--card); border-radius:999px;
  width:38px; height:38px; font-size:17px; cursor:pointer; box-shadow:var(--shadow); color:var(--ink)}
.tabs{display:flex; gap:8px; margin:6px 0 16px}
.tab{flex:1; text-align:center; padding:11px 6px; border-radius:14px; font-weight:700; font-size:14px;
  background:var(--card); border:1px solid var(--line); cursor:pointer; color:var(--muted); box-shadow:var(--shadow)}
.tab.on{color:#fff}
.mode-grund .tab.on{background:var(--grund); border-color:var(--grund)}
.mode-tief .tab.on{background:var(--tief); border-color:var(--tief)}
.banner{background:linear-gradient(135deg,var(--accent),var(--accent-d)); color:#fff;
  padding:14px 16px; border-radius:16px; margin-bottom:16px; cursor:pointer; box-shadow:var(--shadow);
  display:flex; align-items:center; gap:12px}
.banner b{font-size:16px}
.banner small{opacity:.9; display:block; font-size:12px; font-weight:600}
.banner .go{margin-left:auto; font-size:20px}
.blockhead{margin:22px 2px 10px}
.blockhead .bn{font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.6px; color:var(--accent)}
.blockhead .bt{font-size:18px; font-weight:800; letter-spacing:-.2px}
.blockhead .bs{font-size:13px; color:var(--muted)}
.lesson{display:flex; align-items:center; gap:13px; background:var(--card); border:1px solid var(--line);
  padding:13px 14px; border-radius:16px; margin-bottom:10px; cursor:pointer; box-shadow:var(--shadow)}
.lesson .em{width:42px; height:42px; flex:none; border-radius:12px; display:grid; place-items:center;
  font-size:21px; background:var(--bg); border:1px solid var(--line)}
.lesson .tx{flex:1; min-width:0}
.lesson .tt{font-weight:700; font-size:15px}
.lesson .au{font-size:12px; color:var(--muted)}
.lesson .ch{font-size:18px; color:var(--muted)}
.lesson.done .ch{color:var(--good)}
.lesson.done .em{background:var(--good); color:#fff; border-color:var(--good)}

/* runner */
.runwrap{position:fixed; inset:0; background:var(--bg); z-index:50; display:none; flex-direction:column;
  max-width:560px; margin:0 auto; padding:14px 14px 18px}
.runwrap.on{display:flex}
.runtop{display:flex; align-items:center; gap:12px; margin-bottom:14px}
.close{font-size:24px; cursor:pointer; color:var(--muted); line-height:1; padding:2px 6px}
.prog{flex:1; height:10px; background:var(--line); border-radius:999px; overflow:hidden}
.prog>i{display:block; height:100%; width:0; background:var(--accent); transition:width .3s}
.cardarea{flex:1; overflow-y:auto; display:flex; flex-direction:column; justify-content:center}
.card{background:var(--card); border:1px solid var(--line); border-radius:20px; padding:22px;
  box-shadow:var(--shadow); animation:pop .25s ease}
@keyframes pop{from{opacity:0; transform:translateY(10px)}to{opacity:1; transform:none}}
.kicker{font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.7px; color:var(--accent); margin-bottom:8px}
.card .big{font-size:34px; margin-bottom:4px}
.card h2{font-size:21px; margin:.1em 0 .5em; letter-spacing:-.3px}
.card p{margin:.55em 0; font-size:15px}
.card p.lead{font-size:17px; font-weight:500}
.tagpill{display:inline-block; margin-top:12px; font-size:12px; font-weight:700; color:var(--accent);
  background:var(--bg); border:1px solid var(--line); padding:5px 11px; border-radius:999px}
.q{font-size:18px; font-weight:700; margin-bottom:14px}
.opt{display:block; width:100%; text-align:left; background:var(--bg); border:1.5px solid var(--line);
  padding:13px 15px; border-radius:13px; margin-bottom:9px; font-size:15px; cursor:pointer; color:var(--ink)}
.opt.sel{border-color:var(--accent)}
.opt.right{border-color:var(--good); background:rgba(58,138,85,.12)}
.opt.wrong{border-color:var(--bad); background:rgba(192,69,59,.12)}
.fb{margin-top:6px; font-size:14px; padding:12px 14px; border-radius:12px; background:var(--bg); border:1px solid var(--line)}
.fb.ok{border-color:var(--good)} .fb.no{border-color:var(--bad)}
.flipcard{cursor:pointer; text-align:center}
.flipcard .front{font-size:18px; font-weight:600}
.flipcard .reveal{margin-top:14px; padding-top:14px; border-top:1px dashed var(--line); font-size:15px; display:none}
.flipcard.open .reveal{display:block; animation:pop .25s}
.flipcard .hintline{font-size:12px; color:var(--muted); margin-top:12px}
.recall textarea{width:100%; min-height:90px; border:1.5px solid var(--line); border-radius:13px;
  padding:12px; font:inherit; font-size:15px; background:var(--bg); color:var(--ink); resize:vertical}
.model{margin-top:12px; padding:13px 15px; background:var(--bg); border:1px solid var(--line); border-radius:13px;
  font-size:14px; display:none}
.model.show{display:block; animation:pop .25s}
.selfbtns{display:flex; gap:10px; margin-top:12px}
.selfbtns button{flex:1; padding:11px; border-radius:12px; font-weight:700; font-size:15px; cursor:pointer; border:1.5px solid var(--line); background:var(--card); color:var(--ink)}
.selfbtns .gg{border-color:var(--good); color:var(--good)}
.selfbtns .bb{border-color:var(--bad); color:var(--bad)}
.hint{font-size:13px; color:var(--muted); margin-top:10px; cursor:pointer; text-decoration:underline}
.runbtns{margin-top:16px}
.btn{width:100%; padding:15px; border:none; border-radius:15px; background:var(--accent); color:#fff;
  font-size:16px; font-weight:800; cursor:pointer; box-shadow:var(--shadow)}
.btn:disabled{opacity:.4; cursor:default}
.btn.ghost{background:var(--card); color:var(--ink); border:1px solid var(--line)}
.done-screen{text-align:center; padding:30px 10px}
.done-screen .big{font-size:60px}
.done-screen h2{font-size:24px}
.xpgain{color:var(--accent); font-weight:800; font-size:18px}
.wheelfilters{display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin:14px 0 6px}
.wheelfilters .wf{border:1px solid var(--line); background:var(--bg); color:var(--ink);
  padding:8px 14px; border-radius:999px; font-size:14px; font-weight:700; cursor:pointer}
.wheelfilters .wf.on{background:var(--accent); color:#fff; border-color:var(--accent)}
.wseg{stroke:#ffffff; stroke-width:1.2}
.wlbl{fill:#2a2024; font-weight:600; pointer-events:none}
.wlbl-cat{fill:#fff; font-weight:800; pointer-events:none}
.wcenter{fill:var(--card); stroke:var(--line); stroke-width:2}
.wctext{fill:var(--ink); pointer-events:none}
.wheelzoom{display:flex; gap:8px; align-items:center; justify-content:center; margin:2px 0 8px; flex-wrap:wrap}
.wheelzoom .wz{min-width:42px; height:36px; border:1px solid var(--line); background:var(--bg); color:var(--ink);
  border-radius:11px; font-size:19px; font-weight:800; cursor:pointer; line-height:1}
.wheelzoom .wz.fit{font-size:13px; padding:0 12px}
.wheelzoom .wzhint{font-size:11px; color:var(--muted)}
.wheelview{width:100%; max-height:64vh; overflow:auto; border:1px solid var(--line); border-radius:14px;
  background:var(--bg); touch-action:none; cursor:grab; -webkit-overflow-scrolling:touch}
.wheelview:active{cursor:grabbing}
.wheelview svg{display:block; margin:0 auto}
.empty{text-align:center; color:var(--muted); padding:40px 20px; font-size:15px}
footer{text-align:center; color:var(--muted); font-size:11px; margin-top:30px}
</style>
</head>
<body class="mode-grund">

<header>
  <div class="brand">Vino<span>.</span></div>
  <div class="stat" id="streakStat">🔥 0</div>
  <div class="stat" id="xpStat">⭐ 0</div>
  <button class="iconbtn" id="themeBtn" title="Dark Mode">🌙</button>
</header>

<div class="tabs">
  <div class="tab on" data-track="grund">🍇 Grundlagen</div>
  <div class="tab" data-track="tief">🥂 Vertiefung</div>
</div>

<div id="home"></div>

<footer>Vino · selbstgebaute Wein-Lern-App · Fortschritt wird lokal im Browser gespeichert</footer>

<div class="runwrap" id="run">
  <div class="runtop">
    <span class="close" id="closeRun">✕</span>
    <div class="prog"><i id="progBar"></i></div>
  </div>
  <div class="cardarea" id="cardArea"></div>
  <div class="runbtns"><button class="btn" id="nextBtn">Weiter</button></div>
</div>

<script>
/* ===================== DATEN ===================== */
const BLOCKS = {
  grund:[
    {n:"Block 1", title:"Wein verstehen", sub:"Was im Glas passiert"},
    {n:"Block 2", title:"Geschmack & Verkostung", sub:"Riechen, schmecken, beschreiben"},
    {n:"Block 3", title:"Servieren & Genießen", sub:"Temperatur, Glas, Essen"}
  ],
  tief:[
    {n:"Block 1", title:"Weiße Trauben I", sub:"Die großen Klassiker"},
    {n:"Block 2", title:"Weiße Trauben II", sub:"Spezialisten & internationale Sorten"},
    {n:"Block 3", title:"Regionen I", sub:"Deutschland & Frankreich"},
    {n:"Block 4", title:"Regionen II", sub:"Europa & die Neue Welt"},
    {n:"Block 5", title:"Die wichtigsten Weine", sub:"Ikonen, die man kennen sollte"},
    {n:"Block 6", title:"Aromarad & Verkostung", sub:"Riechen lernen & üben"},
    {n:"Block 7", title:"Schaumwein, Rosé & Süßes", sub:"Über den Weißwein hinaus"}
  ]
};

const LESSONS = [
/* ============ GRUNDLAGEN ============ */
{id:"g-was", track:"grund", block:0, icon:"🍇", title:"Was ist Wein?", author:"Vom Traubensaft zum Wein",
 cards:[
  {t:"info", kicker:"Grundlage", emoji:"🍇", h:"Wein ist vergorener Traubensaft",
   body:["Wein entsteht, wenn Hefe den Zucker in Traubensaft (dem „Most“) in Alkohol und Kohlendioxid umwandelt — das nennt man <b>Gärung</b>.",
         "Mehr reifer Zucker in der Traube bedeutet potenziell mehr Alkohol. Stoppt man die Gärung früh, bleibt Restzucker und der Wein wird süßer.",
         "Fast aller Wein der Welt stammt von einer einzigen Pflanzenart: der Edlen Weinrebe <i>Vitis vinifera</i>."]},
  {t:"info", kicker:"Begriffe", emoji:"📖", h:"Drei Wörter, die du oft hörst",
   body:["<b>Rebsorte</b> = die Traubensorte (z. B. Riesling, Chardonnay).",
         "<b>Terroir</b> = das Zusammenspiel aus Boden, Klima und Lage, das einem Wein seinen Charakter gibt.",
         "<b>Jahrgang</b> (Vintage) = das Erntejahr der Trauben. Wetter schwankt jährlich, deshalb schmeckt derselbe Wein von Jahr zu Jahr anders."]},
  {t:"mc", kicker:"Mini-Check", q:"Was macht die Hefe bei der Gärung?",
   opts:["Sie färbt den Wein","Sie wandelt Zucker in Alkohol um","Sie fügt Tannine hinzu","Sie entfernt Säure"],
   correct:1, fb:"Genau — Hefe frisst den Traubenzucker und produziert dabei Alkohol und CO₂."},
  {t:"flip", kicker:"Bonus", front:"Warum heißt der unvergorene Traubensaft „Most“?",
   reveal:"„Most“ ist der frisch gepresste Saft, bevor (oder während) die Gärung beginnt. Sobald die Hefe loslegt, spricht man von Jungwein."},
  {t:"recall", kicker:"Selbsttest", prompt:"Erkläre in einem Satz, wie aus Trauben Wein wird.",
   hint:"Stichwort: Hefe, Zucker, Alkohol",
   model:"Hefe vergärt den Zucker im Traubensaft (Most) zu Alkohol und Kohlendioxid — das Ergebnis ist Wein."}
 ]},
{id:"g-farbe", track:"grund", block:0, icon:"🎨", title:"Weiß, Rot, Rosé", author:"Woher die Farbe kommt",
 cards:[
  {t:"info", kicker:"Grundlage", emoji:"🎨", h:"Die Farbe steckt in der Schale",
   body:["Der Saft fast aller Trauben ist hell. Die Farbe von Rotwein kommt allein aus der <b>Beerenschale</b>, die mitvergoren wird.",
         "<b>Weißwein:</b> Trauben werden gepresst, die Schalen kommen weg — nur der helle Saft vergärt. (Meist aus weißen Trauben, geht aber auch aus rote.)",
         "<b>Rotwein:</b> Saft <i>und</i> Schalen vergären zusammen. Daraus kommen Farbe und Tannin.",
         "<b>Rosé:</b> rote Trauben mit nur kurzem Schalenkontakt — ein paar Stunden Farbe, dann weg."]},
  {t:"info", kicker:"Wichtig", emoji:"💡", h:"Warum Weißwein leichter wirkt",
   body:["Weil dem Weißwein die Tannine aus der Schale fehlen, schmeckt er meist <b>frischer und weniger herb</b> als Rotwein.",
         "Statt Tannin prägen bei Weißwein vor allem <b>Säure, Frucht und manchmal Süße</b> den Geschmack.",
         "Deshalb sind Weißweine oft die zugänglicheren Einsteiger-Weine — und perfekt für deinen Fokus."]},
  {t:"mc", kicker:"Mini-Check", q:"Woher stammt die Farbe von Rotwein?",
   opts:["Aus zugesetztem Farbstoff","Aus dem Traubensaft selbst","Aus der mitvergorenen Beerenschale","Aus dem Eichenfass"],
   correct:2, fb:"Richtig — die Schale gibt Farbstoffe (und Tannin) an den Wein ab."},
  {t:"mc", kicker:"Mini-Check", q:"Wie entsteht Rosé?",
   opts:["Rot- und Weißwein werden gemischt","Rote Trauben mit kurzem Schalenkontakt","Weiße Trauben in rotem Fass","Durch Zugabe von Frucht"],
   correct:1, fb:"In der Regel über kurzen Schalenkontakt. (Das Mischen ist — außer bei Rosé-Champagner — meist nicht erlaubt.)"},
  {t:"recall", kicker:"Selbsttest", prompt:"Warum kann man aus roten Trauben auch Weißwein machen?",
   hint:"Denk an Saft vs. Schale",
   model:"Weil der Saft hell ist — presst man die roten Trauben und entfernt sofort die Schalen, vergärt nur heller Saft ohne Farbe."}
 ]},
{id:"g-suess", track:"grund", block:0, icon:"🍬", title:"Trocken bis süß", author:"Restzucker verstehen",
 cards:[
  {t:"info", kicker:"Grundlage", emoji:"🍬", h:"„Trocken“ heißt: fast kein Zucker übrig",
   body:["<b>Restzucker</b> ist der Zucker, den die Hefe <i>nicht</i> in Alkohol umgewandelt hat. Er bestimmt, wie süß ein Wein schmeckt.",
         "Die deutschen Stufen auf dem Etikett: <b>trocken</b> (sehr wenig Zucker), <b>halbtrocken</b> (dezent), <b>lieblich</b> (deutlich süß), <b>süß</b> (Dessertwein).",
         "International heißt trocken <i>dry / sec / secco</i>, süß <i>sweet / doux / dolce</i>."]},
  {t:"info", kicker:"Aha", emoji:"⚖️", h:"Süße ≠ schlechter, Säure ist der Trick",
   body:["Ein guter süßer Wein schmeckt nicht „klebrig“, weil viel <b>Säure</b> die Süße ausbalanciert. Riesling kann süß <i>und</i> spritzig-frisch zugleich sein.",
         "Achtung Wahrnehmung: Viel Frucht im Aroma lässt einen knochentrockenen Wein süßer wirken, als er chemisch ist."]},
  {t:"mc", kicker:"Mini-Check", q:"Was bedeutet „trocken“ beim Wein?",
   opts:["Er enthält wenig Alkohol","Es ist kaum Restzucker übrig","Er wurde lange gelagert","Er hat keine Säure"],
   correct:1, fb:"Genau — trocken bezieht sich auf den geringen Restzucker, nicht auf Alkohol oder Alter."},
  {t:"flip", kicker:"Bonus", front:"Was bedeutet „feinherb“ auf einem deutschen Etikett?",
   reveal:"Ein inoffizieller, beliebter Begriff — meist gleichbedeutend mit halbtrocken: eine dezente, kaum merkliche Süße. Bei Riesling sehr verbreitet."},
  {t:"recall", kicker:"Selbsttest", prompt:"Warum schmeckt ein süßer Riesling oft trotzdem frisch?",
   hint:"Was balanciert die Süße?",
   model:"Weil seine hohe Säure die Restsüße ausgleicht — Süße und Säure halten sich die Waage, der Wein wirkt lebendig statt klebrig."}
 ]},
{id:"g-bausteine", track:"grund", block:1, icon:"⚖️", title:"Die Geschmacks-Bausteine", author:"Säure, Süße, Körper, Alkohol",
 cards:[
  {t:"info", kicker:"Verkostung", emoji:"⚖️", h:"Vier Stellschrauben im Glas",
   body:["Fast jeder Weißwein lässt sich über vier Größen beschreiben:",
         "<b>Säure</b> — das Frische-/Spritzigkeitsgefühl, lässt den Mund wässern. Hoch bei Riesling & Sauvignon Blanc.",
         "<b>Süße</b> — von trocken bis süß (Restzucker).",
         "<b>Körper</b> — wie „voll/schwer“ der Wein im Mund wirkt: leicht (wie Magermilch) bis vollmundig (wie Sahne).",
         "<b>Alkohol</b> — wärmt im Abgang; meist 11–14 %."]},
  {t:"info", kicker:"Aha", emoji:"🧈", h:"Was den Körper schwerer macht",
   body:["Mehr <b>Alkohol</b>, Ausbau im <b>Eichenfass</b> und der <b>biologische Säureabbau</b> (BSA) machen einen Weißwein voller und cremiger.",
         "Typisch leicht & frisch: Pinot Grigio, Muskateller. Typisch vollmundig & cremig: im Fass gereifter Chardonnay."]},
  {t:"mc", kicker:"Mini-Check", q:"Welcher Baustein lässt den Mund „wässern“ und wirkt frisch?",
   opts:["Alkohol","Körper","Säure","Süße"],
   correct:2, fb:"Die Säure — sie ist das Rückgrat frischer Weißweine."},
  {t:"flip", kicker:"Bonus", front:"Wie erkennst du hohen Alkohol im Glas?",
   reveal:"An den „Kirchenfenstern“ / „Tränen“: die zähen Schlieren, die nach dem Schwenken am Glasrand herablaufen. Außerdem an der Wärme im Abgang."},
  {t:"recall", kicker:"Selbsttest", prompt:"Nenne die vier Bausteine, mit denen man einen Weißwein beschreiben kann.",
   hint:"Zwei davon: frisch und süß",
   model:"Säure, Süße, Körper und Alkohol. (Bei Rotwein käme noch Tannin dazu.)"}
 ]},
{id:"g-aromen", track:"grund", block:1, icon:"👃", title:"Aromen – was du riechst", author:"Die Nase macht den Geschmack",
 cards:[
  {t:"info", kicker:"Verkostung", emoji:"👃", h:"80 % des Geschmacks ist Geruch",
   body:["Die Zunge schmeckt nur süß, sauer, salzig, bitter, umami. Den Rest — Pfirsich, Zitrone, Honig — <b>riechst</b> du.",
         "Aromen teilt man grob in drei Gruppen ein:",
         "<b>Primär</b> (von der Traube): Frucht, Blüten, Kräuter.",
         "<b>Sekundär</b> (von der Herstellung): Brot/Hefe, Butter, Vanille vom Fass.",
         "<b>Tertiär</b> (von der Reife): Honig, Nuss, Trockenfrucht, Benzin-Note beim alten Riesling."]},
  {t:"info", kicker:"Weißwein-Spickzettel", emoji:"🍋", h:"Typische Weißwein-Aromen",
   body:["<b>Zitrus</b> (Zitrone, Limette, Grapefruit) — kühle Klimazonen.",
         "<b>Steinobst</b> (Pfirsich, Aprikose) — Riesling, Viognier.",
         "<b>Tropisch</b> (Ananas, Mango) — warme Klimazonen, Chardonnay.",
         "<b>Grün</b> (Gras, Stachelbeere, Paprika) — Sauvignon Blanc.",
         "<b>Blumig</b> (Rose, Litschi) — Gewürztraminer, Muskateller."]},
  {t:"mc", kicker:"Mini-Check", q:"Eine deutliche Note von frisch gemähtem Gras und Stachelbeere deutet am ehesten auf …",
   opts:["Chardonnay","Sauvignon Blanc","Gewürztraminer","Grauburgunder"],
   correct:1, fb:"Klassischer Sauvignon Blanc — grün, krautig, knackig."},
  {t:"flip", kicker:"Bonus", front:"Warum solltest du am Glas schwenken, bevor du riechst?",
   reveal:"Das Schwenken bringt Sauerstoff an den Wein und lässt flüchtige Aromastoffe verdampfen — so riechst du viel mehr."},
  {t:"recall", kicker:"Selbsttest", prompt:"Was ist der Unterschied zwischen Primär- und Tertiäraromen?",
   hint:"Traube vs. Reife",
   model:"Primäraromen stammen aus der Traube selbst (Frucht, Blüten). Tertiäraromen entstehen erst durch die Reifung/Lagerung (Honig, Nuss, Benzin)."}
 ]},

   body:["Wichtige Angaben: <b>Erzeuger</b>, <b>Region/Herkunft</b>, <b>Jahrgang</b>, oft die <b>Rebsorte</b> und der <b>Alkoholgehalt</b>.",
         "<b>Neue Welt</b> (z. B. Australien, Chile) schreibt meist die Rebsorte groß drauf. <b>Alte Welt</b> (Frankreich, Italien) nennt oft nur die Region — du musst wissen, welche Traube dort wächst.",
         "Beispiel: „Chablis“ steht für 100 % Chardonnay aus Burgund, ohne dass „Chardonnay“ auf der Flasche steht."]},
  {t:"info", kicker:"Deutschland", emoji:"🇩🇪", h:"Die deutschen Qualitätsstufen",
   body:["Grob aufsteigend: <b>Wein</b> / <b>Landwein</b> → <b>Qualitätswein</b> → <b>Prädikatswein</b>.",
         "Die <b>Prädikate</b> richten sich nach dem Zuckergehalt der Trauben bei der Ernte: Kabinett, Spätlese, Auslese, Beerenauslese, Trockenbeerenauslese, Eiswein (zunehmend reifer/süßer).",

/* ---- Block 5: Aromarad & Verkostung ---- */
{id:"t-aromarad1", track:"tief", block:5, icon:"🎡", title:"Das Aromarad erklärt", author:"Wein-Aromen in Worte fassen",
 cards:[
  {t:"info", kicker:"Werkzeug", emoji:"🎡", h:"Was ist das Aromarad?",
   body:["Das <b>Aromarad</b> (Aroma Wheel) ist eine kreisförmige Tabelle, die typische Weinaromen ordnet. Es wurde 1984 von der US-Forscherin <b>Ann C. Noble</b> (UC Davis) entwickelt.",
         "Ziel: <b>Geruchseindrücke in präzise Worte fassen</b>, statt nur „riecht halt nach Wein“ zu sagen.",
         "Es ist eine Lern- und Kommunikationshilfe — kein Bewertungssystem."]},
  {t:"wheel", kicker:"Interaktiv", h:"Dein Aromarad live",
   note:"Tippe auf <b>Wein</b>, <b>Kaffee</b> oder <b>beide</b>. Außen die konkreten Aromen, nach innen immer gröber."},
  {t:"info", kicker:"Aufbau", emoji:"⭕", h:"Von innen nach außen: allgemein → konkret",
   body:["<b>Innerer Ring:</b> grobe Kategorien — z. B. fruchtig, blumig, würzig, pflanzlich/grün, erdig, geröstet.",
         "<b>Mittlerer Ring:</b> Unterklassen — bei „fruchtig“ etwa Zitrus, Steinobst, Tropenfrucht.",
         "<b>Äußerer Ring:</b> ganz konkrete Aromen — z. B. Zitrone, Pfirsich, Ananas.",
         "Du arbeitest dich <b>von innen nach außen</b>: erst die grobe Richtung, dann immer genauer."]},
  {t:"mc", kicker:"Mini-Check", q:"Wie arbeitet man sich durch das Aromarad?",
   opts:["Von außen (konkret) nach innen","Von innen (grob) nach außen (konkret)","Zufällig","Nur den äußeren Ring"],
   correct:1, fb:"Von innen nach außen: erst die grobe Kategorie (fruchtig?), dann verfeinern (Zitrus → Zitrone)."},
  {t:"flip", kicker:"Bonus", front:"Wofür ist das Aromarad NICHT gedacht?",
   reveal:"Nicht zum Bewerten der Qualität — es hilft nur, Aromen zu benennen und zu kommunizieren. Ein „einfaches“ Aroma ist nicht schlechter als ein „edles“."},
  {t:"recall", kicker:"Selbsttest", prompt:"Erkläre Sinn und Aufbau des Aromarads in zwei Sätzen.",
   hint:"Worte finden; Ringe grob→fein",
   model:"Das Aromarad hilft, Weinaromen in Worte zu fassen. Es ist in Ringen von grob (innen: z. B. fruchtig) bis konkret (außen: z. B. Zitrone) aufgebaut, die man von innen nach außen durchgeht."}
 ]},
{id:"t-aromarad2", track:"tief", block:5, icon:"👃", title:"Mit dem Aromarad üben", author:"Schritt für Schritt riechen",

  {t:"info", kicker:"Methode", emoji:"👃", h:"So nutzt du es beim Verkosten",
   body:["1. <b>Schwenken & riechen</b>, Augen zu. Erste Frage: grobe Kategorie — fruchtig? blumig? würzig? grün?",
         "2. <b>Verfeinern:</b> Wenn fruchtig → Zitrus, Steinobst oder Tropenfrucht? Dann ganz konkret: Zitrone? Pfirsich? Ananas?",

   body:["<b>Vergleichsverkostung:</b> 2–3 Weiße nebeneinander (z. B. Riesling vs. Sauvignon Blanc vs. Chardonnay) — Unterschiede springen direkt ins Auge/an die Nase.",
         "<b>Aroma-Kit basteln:</b> kleine Schälchen mit Zitrone, Pfirsich, Apfel, Gras, Honig usw. blind erschnüffeln und benennen.",
         "<b>In den Wein „spiken“:</b> einen Tropfen Zitronensaft oder etwas Pfirsich ins Glas geben und merken, wie sich der Eindruck verändert."]},
  {t:"mc", kicker:"Mini-Check", q:"Was ist der erste Schritt beim Riechen mit dem Aromarad?",
   opts:["Sofort die genaue Frucht raten","Die grobe Kategorie bestimmen","Den Wein schmecken","Das Etikett lesen"],
   correct:1, fb:"Erst die grobe Richtung (fruchtig/blumig/würzig/grün), dann verfeinern."},
  {t:"flip", kicker:"Bonus", front:"Warum hilft es, Aromen laut auszusprechen oder aufzuschreiben?",
   reveal:"Das Benennen verknüpft Geruch mit Sprache und Erinnerung — so baust du ein „Geruchsgedächtnis“ auf und erkennst Aromen beim nächsten Mal schneller."},
  {t:"recall", kicker:"Selbsttest", prompt:"Beschreibe eine konkrete Übung, um deine Wein-Nase zu trainieren.",
   hint:"Vergleich oder Aroma-Kit",
   model:"z. B. Vergleichsverkostung von 2–3 Weißweinen nebeneinander, oder ein Aroma-Kit (Zitrone, Pfirsich, Gras …) blind erriechen und benennen."}
 ]},
{id:"t-aromarad3", track:"tief", block:5, icon:"🧠", title:"Geruchsgedächtnis trainieren", author:"Aromen im Alltag üben",
 cards:[
  {t:"info", kicker:"Praxis", emoji:"🧠", h:"Riechen kann man lernen",
   body:["Aromen erkennen ist <b>Übungssache</b>, kein Talent. Das Gehirn lernt Gerüche, indem es sie mit Namen verknüpft.",
         "<b>Im Alltag bewusst riechen:</b> an Obst, Kräutern, Gewürzen, Kaffee, nassen Steinen, frischem Brot — und innerlich benennen.",
         "So baust du eine „Geruchsbibliothek“ auf, auf die du beim Wein zurückgreifst."]},
  {t:"info", kicker:"Häufige Wein-Aromen", emoji:"📚", h:"Diese Gruppen lohnt es zu kennen",
   body:["<b>Zitrus</b> (Zitrone, Limette), <b>Steinobst</b> (Pfirsich, Aprikose), <b>Kernobst</b> (Apfel, Birne), <b>Tropisch</b> (Ananas, Mango).",
         "<b>Blumig</b> (Rose, Holunder, Akazie), <b>Grün/krautig</b> (Gras, Paprika, Stachelbeere).",
         "<b>Würzig/süßlich vom Ausbau</b> (Vanille, Brot, Butter, Honig, Nuss) — die kommen oft von Fass, Hefe oder Reife.",
         "Profi-Tipp: Es gibt fertige Aroma-Sets (z. B. „Le Nez du Vin“) mit echten Duftproben zum Trainieren."]},
  {t:"mc", kicker:"Mini-Check", q:"Wie verbessert man laut Geruchsforschung das Aromen-Erkennen am besten?",
   opts:["Nur viel Wein trinken","Gerüche bewusst mit Namen verknüpfen","Auf Talent vertrauen","Schnell schnüffeln"],
   correct:1, fb:"Genau — das bewusste Benennen verankert Gerüche im Gedächtnis. Riechen ist trainierbar."},
  {t:"flip", kicker:"Bonus", front:"Wo kommen Aromen wie Vanille, Brot und Butter im Wein her?",
   reveal:"Nicht aus der Traube, sondern vom Ausbau: Vanille/Toast vom Eichenfass, Brot/Hefe von der Hefelagerung, Butter vom biologischen Säureabbau (BSA)."},
  {t:"recall", kicker:"Selbsttest", prompt:"Wie trainierst du dein Geruchsgedächtnis im Alltag?",
   hint:"riechen + benennen",
   model:"Indem ich im Alltag bewusst an Obst, Kräutern, Gewürzen usw. rieche und sie innerlich benenne — so baue ich eine Geruchsbibliothek für die Weinverkostung auf."}
 ]},

{id:"t-schaumwein", track:"tief", block:6, icon:"🍾", title:"Schaumwein", author:"Champagner, Sekt, Prosecco, Cava",
 cards:[
  {t:"info", kicker:"Bubbles", emoji:"🍾", h:"Woher die Bläschen kommen",

function load(){

}
function fresh(){ return {xp:0, streak:0, lastDay:null, done:{}, srs:{}, theme:"light"}; }

function todayNum(){ const d=new Date(); return Math.floor(new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime()/DAY); }
function bumpStreak(){
  const t=todayNum();
  if(state.lastDay===t) return;
  if(state.lastDay===t-1) state.streak++;
  else state.streak=1;
  state.lastDay=t;
}

function dueCards(){
  const now=Date.now(); const out=[];
  for(const les of LESSONS){
    les.cards.forEach((c,i)=>{
      if(c.t!=="mc" && c.t!=="recall") return;
      const k=les.id+":"+i;
      const rec=state.srs[k];
      if(rec && rec.due<=now) out.push({lesson:les, index:i, card:c});
    });
  }
  return out;
}
function scheduleCard(lessonId,index,correct){
  const k=lessonId+":"+index;
  let rec=state.srs[k] || {stage:-1};
  if(correct) rec.stage=Math.min(rec.stage+1, SRS_DAYS.length-1);
  else rec.stage=0;
  rec.due=Date.now()+SRS_DAYS[rec.stage]*DAY;
  state.srs[k]=rec;
}

/* ---------- THEME ---------- */
function applyTheme(){
  document.documentElement.setAttribute("data-theme", state.theme==="dark"?"dark":"light");
  document.getElementById("themeBtn").textContent = state.theme==="dark"?"☀️":"🌙";
}
document.getElementById("themeBtn").onclick=()=>{ state.theme = state.theme==="dark"?"light":"dark"; save(); applyTheme(); };

/* ---------- NAV ---------- */
document.querySelectorAll(".tab").forEach(tab=>{
  tab.onclick=()=>{
    track=tab.dataset.track;
    document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("on", t===tab));
    document.body.className = "mode-"+track;
    document.documentElement.style.setProperty("--accent", track==="grund"?"var(--grund)":"var(--tief)");
    document.documentElement.style.setProperty("--accent-d", track==="grund"?"var(--grund-d)":"var(--tief-d)");
    renderHome();
  };
});

/* ---------- HOME ---------- */
function renderHome(){
  document.getElementById("streakStat").textContent="🔥 "+state.streak;
  document.getElementById("xpStat").textContent="⭐ "+state.xp;
  const home=document.getElementById("home");
  const due=dueCards().length;
  let html="";
  if(due>0){
    html+=`<div class="banner" onclick="startReview()">
      <span style="font-size:26px">🔁</span>
      <div><b>${due} Karte${due>1?"n":""} fällig</b><small>Wiederholen festigt dein Wissen</small></div>
      <span class="go">→</span></div>`;
  }
  const blocks=BLOCKS[track];
  blocks.forEach((b,bi)=>{
    const lessons=LESSONS.filter(l=>l.track===track && l.block===bi);
    if(!lessons.length) return;
    html+=`<div class="blockhead"><div class="bn">${b.n}</div><div class="bt">${b.title}</div><div class="bs">${b.sub}</div></div>`;
    if(track==="tief" && bi===5){
      html+=`<div class="lesson" style="border-style:dashed" onclick="startWheelTool()">
        <div class="em">🎡</div>
        <div class="tx"><div class="tt">Interaktives Aromarad</div><div class="au">Jederzeit öffnen · Wein / Kaffee / beide</div></div>
        <div class="ch">›</div></div>`;
    }
    lessons.forEach(l=>{
      const done=!!state.done[l.id];
      html+=`<div class="lesson ${done?"done":""}" onclick="startLesson('${l.id}')">
        <div class="em">${done?"✓":l.icon}</div>
        <div class="tx"><div class="tt">${l.title}</div><div class="au">${l.author}</div></div>
        <div class="ch">${done?"✓":"›"}</div></div>`;
    });
  });
  home.innerHTML=html;
}

/* ---------- RUNNER ---------- */
function startLesson(id){
  const les=LESSONS.find(l=>l.id===id);
  session={cards: les.cards.map((c,i)=>({lesson:les,index:i,card:c})), pos:0, lessonId:id, correct:0, review:false};
  openRun();
}
function startReview(){
  const due=dueCards();
  if(!due.length) return;
  // shuffle
  for(let i=due.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [due[i],due[j]]=[due[j],due[i]]; }
  session={cards:due, pos:0, lessonId:null, correct:0, review:true};
  openRun();
}
function startWheelTool(){
  session={cards:[{lesson:null,index:0,card:{t:"wheel",kicker:"Werkzeug",h:"Aromarad",note:"Tippe auf <b>Wein</b>, <b>Kaffee</b> oder <b>beide</b>. Außen die konkreten Aromen, nach innen immer gröber."}}], pos:0, lessonId:null, correct:0, tool:true};
  openRun();
}
function openRun(){
  document.getElementById("run").classList.add("on");
  renderCard();
  const nb=document.getElementById("nextBtn");
  if(session && session.tool){ nb.textContent="Schließen"; }
}
document.getElementById("closeRun").onclick=closeRun;
function closeRun(){
  document.getElementById("run").classList.remove("on");
  session=null; save(); renderHome();
}

let cardAnswered=false;
function renderCard(){
  const total=session.cards.length;
  const item=session.cards[session.pos];
  document.getElementById("progBar").style.width=((session.pos)/total*100)+"%";
  const area=document.getElementById("cardArea");
  const c=item.card;
  cardAnswered=false;
  const nb=document.getElementById("nextBtn");
  nb.textContent = session.pos===total-1 ? "Fertig" : "Weiter";

  if(c.t==="info"){
    const lead=c.body[0], rest=c.body.slice(1);
    area.innerHTML=`<div class="card">
      <div class="kicker">${c.kicker||""}</div>
      <div class="big">${c.emoji||""}</div>
      <h2>${c.h||""}</h2>
      <p class="lead">${lead}</p>
      ${rest.map(p=>`<p>${p}</p>`).join("")}
      ${c.tag?`<div class="tagpill">${c.tag}</div>`:""}
    </div>`;
    enableNext(true);
  }
  else if(c.t==="wheel"){
    area.innerHTML=`<div class="card">
      <div class="kicker">${c.kicker||"Aromarad"}</div>
      <h2>${c.h||"Aromarad"}</h2>
      ${c.note?`<p style="font-size:14px;color:var(--muted)">${c.note}</p>`:""}
      <div style="margin-top:10px;border:1px solid var(--line);border-radius:12px;overflow:hidden">
        <iframe src="https://mvonulmerbach-ship-it.github.io/aroma-rad/"
          title="Aromarad" loading="lazy"
          style="display:block;width:100%;height:78vh;max-height:720px;min-height:480px;border:0"></iframe>
      </div>
    </div>`;
    enableNext(true);
  }
  else if(c.t==="mc"){
    area.innerHTML=`<div class="card">
      <div class="kicker">${c.kicker||"Quiz"}</div>
      <div class="q">${c.q}</div>
      <div id="opts">${c.opts.map((o,i)=>`<button class="opt" data-i="${i}">${o}</button>`).join("")}</div>
      <div id="mcfb"></div></div>`;
    enableNext(false);
    area.querySelectorAll(".opt").forEach(btn=>{
      btn.onclick=()=>{
        if(cardAnswered) return;
        cardAnswered=true;
        const chosen=+btn.dataset.i;
        const right=c.correct;
        area.querySelectorAll(".opt").forEach((b,i)=>{
          if(i===right) b.classList.add("right");
          if(i===chosen && chosen!==right) b.classList.add("wrong");
          b.style.pointerEvents="none";
        });
        const ok=chosen===right;
        document.getElementById("mcfb").innerHTML=`<div class="fb ${ok?"ok":"no"}">${ok?"✅ Richtig. ":"❌ "}${c.fb||""}</div>`;
        scheduleCard(item.lesson.id,item.index,ok);
        if(ok) session.correct++;
        enableNext(true);
      };
    });
  }
  else if(c.t==="flip"){
    area.innerHTML=`<div class="card flipcard" id="flip">
      <div class="kicker">${c.kicker||"Bonus"}</div>
      <div class="front">${c.front}</div>
      <div class="reveal">${c.reveal}</div>
      <div class="hintline">Tippen zum Aufdecken</div></div>`;
    enableNext(false);
    document.getElementById("flip").onclick=function(){
      this.classList.add("open");
      this.querySelector(".hintline").style.display="none";
      enableNext(true);
    };
  }
  else if(c.t==="recall"){
    area.innerHTML=`<div class="card recall">
      <div class="kicker">${c.kicker||"Selbsttest"}</div>
      <p class="lead">${c.prompt}</p>
      <textarea id="ta" placeholder="Antwort in Gedanken oder hier eintippen …"></textarea>
      ${c.hint?`<div class="hint" id="hintBtn">💡 Tipp anzeigen</div>`:""}
      <div class="model" id="model"><b>Musterantwort:</b><br>${c.model}</div>
      <div class="selfbtns" id="self" style="display:none">
        <button class="bb" data-ok="0">👎 Nochmal</button>
        <button class="gg" data-ok="1">👍 Wusste ich</button>
      </div>
      <button class="btn ghost" id="revealModel" style="margin-top:12px">Musterantwort zeigen</button>
    </div>`;
    enableNext(false);
    if(c.hint) document.getElementById("hintBtn").onclick=function(){ alert(c.hint); };
    document.getElementById("revealModel").onclick=function(){
      document.getElementById("model").classList.add("show");
      document.getElementById("self").style.display="flex";
      this.style.display="none";
    };
    document.querySelectorAll("#self button").forEach(b=>{
      b.onclick=()=>{
        if(cardAnswered) return;
        cardAnswered=true;
        const ok=b.dataset.ok==="1";
        if(item.lesson) scheduleCard(item.lesson.id,item.index,ok);
        if(ok) session.correct++;
        document.querySelectorAll("#self button").forEach(x=>x.style.pointerEvents="none");
        b.style.outline="2px solid var(--accent)";
        enableNext(true);
      };
    });
  }
  area.scrollTop=0;
}

function enableNext(on){ document.getElementById("nextBtn").disabled=!on; }

document.getElementById("nextBtn").onclick=()=>{
  if(document.getElementById("nextBtn").disabled) return;
  session.pos++;
  if(session.pos>=session.cards.length){ finishSession(); return; }
  renderCard();
};

function finishSession(){
  if(session.tool){ closeRun(); return; }
  document.getElementById("progBar").style.width="100%";
  let gained=0;
  if(!session.review){
    if(!state.done[session.lessonId]){ gained=20; }
    else { gained=8; }
    state.done[session.lessonId]=true;
  } else {
    gained=Math.max(5, session.correct*5);
  }
  state.xp+=gained;
  bumpStreak();
  save();
  const area=document.getElementById("cardArea");
  const total=session.cards.length;
  area.innerHTML=`<div class="card done-screen">
    <div class="big">🎉</div>
    <h2>${session.review?"Wiederholung geschafft!":"Lektion abgeschlossen!"}</h2>
    <p>${session.review?`Du hast ${session.correct}/${total} sicher gewusst.`:"Stark — weiter so."}</p>
    <p class="xpgain">+${gained} XP</p>
    <p style="color:var(--muted);font-size:13px">🔥 Streak: ${state.streak} Tag${state.streak>1?"e":""}</p>
  </div>`;
  const nb=document.getElementById("nextBtn");
  nb.textContent="Zurück zur Übersicht"; nb.disabled=false;
  nb.onclick=()=>{ nb.onclick=nextHandler; closeRun(); };
}
const nextHandler=document.getElementById("nextBtn").onclick;

/* ---------- INIT ---------- */
applyTheme();
renderHome();
</script>
</body>
</html>
